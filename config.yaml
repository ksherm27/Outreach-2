        - plaid            # 94 jobs
        - replit           # 82 jobs
        - perplexity       # 80 jobs
        - sentry           # 37 jobs
        - livekit          # 19 jobs
        - oyster           # 18 jobs
        - posthog          # 17 jobs
        - airbyte          # 7 jobs
        - statsig          # 7 jobs
