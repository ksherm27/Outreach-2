        - Canva
        - Gong
        - BigCommerce
    jobvite:
      enabled: false  # Companies migrated — slugs redirect to invalid page
      company_slugs: []
    icims:
      enabled: false
      company_slugs: []
    workable:
      enabled: true
      company_slugs:
        - oysterhr
    jazzhr:
      enabled: false
      company_slugs: []
    recruiterbox:
      enabled: false
      company_slugs: []
    wellfound:
      enabled: false
      company_slugs: []
