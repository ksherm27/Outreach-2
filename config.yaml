system:
  name: "GTM Outreach Automation"
  environment: "production"
  timezone: "America/New_York"
  log_level: "INFO"
  dry_run: false

scraping:
  schedule_every_hours: 6
  board_stagger_minutes: 7
  request_delay_min_seconds: 2
  request_delay_max_seconds: 8
  max_requests_per_domain_per_second: 0.33
  respect_robots_txt: true
  job_max_age_hours: 72
  dedup_window_days: 30
  boards:
    linkedin:
      enabled: true
      company_slugs: []
    indeed:
      enabled: true
      company_slugs: []
    greenhouse:
      enabled: true
      company_slugs:
        # Original verified (28 companies)
        - figma
        - gusto
        - airtable
        - brex
        - cockroachlabs
        - dbtlabsinc
        - anthropic
        - datadog
        - grafanalabs
        - calendly
        - gongio
        - hightouch
        - materialize
        - launchdarkly
        - starburst
        - fivetran
        - cribl
        - chainguard
        - coreweave
        - assemblyai
        - runwayml
        - hextechnologies
        - mercury
        - temporaltechnologies
        - dagsterlabs
        - salesloft
        - verkada
        - tripactions
        # AI companies
        - scaleai          # 165 jobs (AI data platform)
        - hebbia           # 25 jobs (AI knowledge work)
        - figureai         # 95 jobs (AI robotics)
        - deepmind         # 104 jobs (Google DeepMind)
        - andurilindustries # 1686 jobs (AI defense)
        - waymo            # 425 jobs (AI autonomous vehicles)
        - nuro             # 108 jobs (AI delivery robots)
        # Newly verified high-volume companies
