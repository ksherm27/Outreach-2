      company_slugs: []
    bamboohr:
      enabled: false  # All company slugs redirect to bamboohr.com — companies migrated
      company_slugs: []
    rippling:
      enabled: false
      company_slugs: []
    smartrecruiters:
      enabled: true
      company_slugs:
