        - okta             # 365 jobs
        - zscaler          # 294 jobs
        - elastic          # 221 jobs
        - braze            # 163 jobs
        - twilio           # 138 jobs
        - contentful       # 110 jobs
        - vercel           # 78 jobs
        - amplitude        # 55 jobs
        - mixpanel         # 47 jobs
        - pagerduty        # 45 jobs
        - iterable         # 41 jobs
        - showpad          # 14 jobs
        - planetscale      # 5 jobs
        - netlify          # 2 jobs
    lever:
      enabled: true
      company_slugs:
        - neon
        # High GTM volume
        - spotify           # 35 GTM roles
        - plaid             # 34 GTM roles
        - mistral           # 25 GTM roles (AI)
        - outreach          # 16 GTM roles
        - palantir          # 12 GTM roles (AI/data)
        - mindtickle        # 10 GTM roles
        - activecampaign    # 3 GTM roles
        - zilliz            # 4 GTM roles (AI vector DB)
        - people-ai         # 2 GTM roles (AI)
        - omnisend          # 4 GTM roles
        - shieldai          # 249 jobs (AI defense/autonomy)
    ashby:
      enabled: true
      company_slugs:
        # Original verified (23 companies)
